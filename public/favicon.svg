  </defs>
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <path d="M9 21 L9 19.5 L18 10.5 L21.5 14 L12.5 23 L11 23 Z M19 9.5 L21 7.5 L24.5 11 L22.5 13 Z"
